services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canyougraduate
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # 로컬에 reborn-redis가 6379를 이미 점유하고 있어 호스트 포트만 6380으로 분리
      - "6380:6379"

volumes:
  db_data:
