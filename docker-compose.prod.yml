# 홈서버(그램) 배포용. 로컬 개발용 docker-compose.yml과 별개.
# Cloudflare Tunnel(cloudflared)이 같은 호스트에서 localhost:3000(web)/localhost:4000(api)로
# 직접 연결하므로, 여기서는 모든 포트를 127.0.0.1에만 바인딩하고 외부에는 노출하지 않는다.
# 실행: docker compose --env-file deployment/env/.env -f docker-compose.prod.yml --project-directory . up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: canyougraduate
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - deployment/env/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file:
      - deployment/env/.env
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  db_data:
